// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        compileSdkVersion = 35
        minSdkVersion = 23
        targetSdkVersion = 34

        kotlin_version = '1.9.25'
        kotlinx_version = '1.8.1'
        ksp_version = '1.9.25-1.0.20'

        desugar_version = '2.0.4'

        firebase_version = '33.1.2'
        gms_location_version = '21.3.0'
        gms_base_version = '18.5.0'
        gms_basement_version = '18.4.0'
        gms_tasks_version = '18.2.0'
        gms_wearable_version = '18.2.0'

        annotation_version = '1.8.2'
        activity_version = '1.9.1'
        appcompat_version = '1.7.0'
        constraintlayout_version = '2.1.4'
        core_version = '1.13.1'
        arch_core_runtime_version = '2.2.0'
        fragment_version = '1.8.2'
        lifecycle_version = '2.8.4'
        nav_version = '2.7.7'
        paging_version = '3.3.2'
        preference_version = '1.2.1'
        recyclerview_version = '1.3.2'
        room_version = '2.6.1'
        coresplash_version = '1.0.1'
        vectordrawable_version = '1.2.0'
        work_version = '2.9.1'

        test_core_version = '1.6.1'
        test_runner_version = '1.6.2'
        test_rules_version = '1.6.1'
        junit_version = '1.2.1'
        androidx_truth_version = '1.6.0'
        google_truth_version = '1.4.4'

        material_version = '1.12.0'

        compose_compiler_version = '1.5.15'
        compose_bom_version = '2024.06.00'
        wear_compose_version = '1.3.1'
        wear_tiles_version = '1.4.0'
        wear_watchface_version = '1.2.1'
        horologist_version = '0.5.28'
        accompanist_version = '0.34.0'

        glide_version = '4.16.0'
        icu4j_version = '75.1'
        jjwt_version = '0.12.6'
        moshi_version = '1.15.1'
        okhttp_version = '4.12.0'
        timber_version = '5.0.1'
    }

    repositories {
        mavenCentral()
        google()
        maven { url 'https://jitpack.io' }
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.5.2'
        classpath "com.google.devtools.ksp:com.google.devtools.ksp.gradle.plugin:$ksp_version"
        classpath 'com.google.gms:google-services:4.4.2'
        classpath 'com.google.firebase:firebase-crashlytics-gradle:3.0.2'
        classpath 'com.google.firebase:perf-plugin:1.4.2'
        classpath "androidx.navigation:navigation-safe-args-gradle-plugin:$nav_version"
        classpath "androidx.room:room-gradle-plugin:$room_version"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

allprojects {
    repositories {
        mavenCentral()
        google()
        maven { url 'https://jitpack.io' }
    }
}

tasks.register('clean', Delete) {
    delete rootProject.buildDir
}
