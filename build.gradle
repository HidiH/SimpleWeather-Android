// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        compileSdkVersion = 36
        minSdkVersion = 23
        targetSdkVersion = 35

        kotlin_version = '2.1.20'
        kotlinx_version = '1.10.2'
        ksp_version = '2.1.20-2.0.1'

        desugar_version = '2.1.5'

        firebase_version = '34.2.0'
        gms_location_version = '21.3.0'
        gms_base_version = '18.8.0'
        gms_basement_version = '18.8.0'
        gms_tasks_version = '18.4.0'
        gms_wearable_version = '19.0.0'

        annotation_version = '1.9.1'
        activity_version = '1.11.0'
        appcompat_version = '1.7.1'
        constraintlayout_version = '2.2.1'
        core_version = '1.17.0'
        arch_core_runtime_version = '2.2.0'
        fragment_version = '1.8.9'
        lifecycle_version = '2.9.3'
        nav_version = '2.9.4'
        paging_version = '3.3.6'
        preference_version = '1.2.1'
        recyclerview_version = '1.4.0'
        room_version = '2.8.0'
        coresplash_version = '1.0.1'
        vectordrawable_version = '1.2.0'
        work_version = '2.10.4'

        test_core_version = '1.7.0'
        test_runner_version = '1.7.0'
        test_rules_version = '1.7.0'
        junit_version = '1.3.0'
        androidx_truth_version = '1.7.0'
        google_truth_version = '1.4.5'

        material_version = '1.14.0-alpha04'

        compose_compiler_version = '1.5.15'
        compose_bom_version = '2025.09.00'
        wear_compose_version = '1.5.1'
        wear_tiles_version = '1.5.0'
        wear_watchface_version = '1.2.1'
        horologist_version = '0.7.15'
        accompanist_version = '0.37.3'

        glide_version = '5.0.5'
        icu4j_version = '77.1'
        jjwt_version = '0.13.0'
        moshi_version = '1.15.2'
        okhttp_version = '5.1.0'
        timber_version = '5.0.1'
    }

    repositories {
        mavenCentral()
        google()
        maven { url 'https://jitpack.io' }
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath "com.google.devtools.ksp:com.google.devtools.ksp.gradle.plugin:$ksp_version"
        classpath 'com.google.gms:google-services:4.4.3'
        classpath 'com.google.firebase:firebase-crashlytics-gradle:3.0.6'
        classpath 'com.google.firebase:perf-plugin:2.0.1'
        classpath "androidx.navigation:navigation-safe-args-gradle-plugin:$nav_version"
        classpath "androidx.room:room-gradle-plugin:$room_version"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        classpath "org.jetbrains.kotlin:compose-compiler-gradle-plugin:$kotlin_version"

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

allprojects {
    repositories {
        mavenCentral()
        google()
        maven { url 'https://jitpack.io' }
    }
}

tasks.register('clean', Delete) {
    delete rootProject.buildDir
}
